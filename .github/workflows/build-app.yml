name: Build Electron App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release'
        required: false
        default: '1.0.0'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
    # ----------------------------------------------------
    # Checkout
    # ----------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4

    # ----------------------------------------------------
    # Node.js (Firebase + tooling)
    # ----------------------------------------------------
    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

    # ----------------------------------------------------
    # Python (PyInstaller + node-gyp)
    # ----------------------------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # ----------------------------------------------------
    # Linux native build dependencies
    # ----------------------------------------------------
    - name: Install Linux build tools
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libffi-dev \
          python3-tk \
          python3-dev \
          portaudio19-dev

    # ----------------------------------------------------
    # macOS native build dependencies
    # ----------------------------------------------------
    - name: Install macOS build tools
      if: matrix.os == 'macos-latest'
      run: |
        brew install portaudio

    # ----------------------------------------------------
    # Build Python executables (bundled with all deps)
    # ----------------------------------------------------
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r vosk-requirements.txt
        pip install pyinstaller

    - name: Build vosk_server_v2 executable
      shell: bash
      run: |
        pyinstaller --onefile --console --name vosk_server_v2 \
          --hidden-import=vosk \
          --hidden-import=websockets \
          --hidden-import=websockets.legacy \
          --hidden-import=websockets.legacy.server \
          --hidden-import=websockets.legacy.client \
          --hidden-import=websockets.legacy.protocol \
          --hidden-import=websockets.legacy.handshake \
          --hidden-import=websockets.server \
          --hidden-import=websockets.client \
          --hidden-import=websockets.exceptions \
          --hidden-import=websockets.frames \
          --hidden-import=websockets.headers \
          --hidden-import=websockets.http \
          --hidden-import=websockets.http11 \
          --hidden-import=websockets.uri \
          --hidden-import=json \
          --hidden-import=logging \
          --hidden-import=asyncio \
          --hidden-import=argparse \
          --hidden-import=pathlib \
          --hidden-import=edge_tts \
          --collect-all vosk \
          --collect-all websockets \
          --collect-all edge_tts \
          vosk_server_v2.py

    - name: Verify vosk executable
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          ./dist/vosk_server_v2.exe --help
        else
          ./dist/vosk_server_v2 --help
        fi

    - name: Copy Python executables to assets
      shell: bash
      run: |
        mkdir -p assets/binaries

        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          cp dist/vosk_server_v2.exe assets/binaries/
        else
          cp dist/vosk_server_v2 assets/binaries/
          chmod +x assets/binaries/vosk_server_v2
        fi

        echo "Contents of assets/binaries:"
        ls -la assets/binaries/

    # ----------------------------------------------------
    # Install dependencies (STRICT, deterministic)
    # ----------------------------------------------------
    - name: Install npm dependencies
      run: npm ci

    # ----------------------------------------------------
    # Rebuild native modules FOR ELECTRON (CRITICAL)
    # ----------------------------------------------------
    - name: Rebuild native modules for Electron
      run: |
        npx electron-rebuild -f
      env:
        npm_config_build_from_source: true

    # ----------------------------------------------------
    # Build Electron app
    # ----------------------------------------------------
    - name: Build Electron app
      run: npm run build-app
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ----------------------------------------------------
    # Package artifacts
    # ----------------------------------------------------
    - name: Package build artifacts
      shell: bash
      run: |
        mkdir -p dist-packaged

        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          tar -czf dist-packaged/Control-linux-x64.tar.gz -C dist .

        elif [ "${{ matrix.os }}" = "windows-latest" ]; then
          cd dist
          7z a -tzip ../dist-packaged/Control-win-x64.zip *
          cd ..

        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          tar -czf dist-packaged/Control-mac-x64.tar.gz -C dist .
        fi

    # ----------------------------------------------------
    # Upload artifacts
    # ----------------------------------------------------
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Control-${{ matrix.os }}
        path: dist-packaged/*

  # ----------------------------------------------------
  # Release job (manual/tag only)
  # ----------------------------------------------------
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release-artifacts/**/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
